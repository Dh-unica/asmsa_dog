dog.settings:
  path: '/admin/config/services/dog-settings'
  defaults:
    _title: 'Drupal Omeka Geonode Settings'
    _form: 'Drupal\dog\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'

dog.cache_management:
  path: '/admin/config/services/dog-cache'
  defaults:
    _title: 'Gestione Cache Omeka API'
    _form: 'Drupal\dog\Form\CacheManagementForm'
  requirements:
    _permission: 'administer site configuration'
