services:

  # Cache bins.
  cache.omeka_resources:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: ['@cache_factory', 'get']
    arguments: ['omeka_resources']

  # Services.
  dog.omeka_resource_fetcher:
    class: Drupal\dog\Service\OmekaResourceFetcher
    arguments: [ '@config.factory', '@http_client_factory', '@logger.factory' ]

  dog.omeka_url:
    class: Drupal\dog\Service\OmekaUrlService
    arguments: ['@http_client', '@cache.default']

  dog.omeka_resource_view_builder:
    class: Drupal\dog\Service\OmekaResourceViewBuilder
    arguments: [ '@dog.omeka_cache' ]

  # New Omeka cache service.
  dog.omeka_cache:
    class: Drupal\dog\Service\OmekaCacheService
    arguments: [ '@dog.omeka_resource_fetcher', '@dog.omeka_url', '@cache.omeka_resources', '@state', '@config.factory', '@logger.factory' ]

  # Omeka cache cron handler
  dog.omeka_cache_cron_handler:
    class: Drupal\dog\Cron\OmekaCacheCronHandler
    arguments: [ '@dog.omeka_cache', '@state', '@logger.factory' ]

  # Event Subscriber.
  dog.omeka_resource_query_event:
    class: Drupal\dog\EventSubscriber\OmekaResourceSubscriber
    arguments: [ '@dog.omeka_resource_fetcher' ]
    tags:
      - { name: event_subscriber }
